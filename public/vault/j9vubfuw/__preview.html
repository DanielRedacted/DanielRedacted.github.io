<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Roadtrip</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- PWA: installable + offline. Relative hrefs resolve under the vault dir, so the hash can change without editing this. Only ciphertext is ever cached. -->
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#0a0a0a" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            /* ── FIELD design system (danielredacted.net) — access-terminal login gate ── */
            @font-face{font-family:"B612 Mono";src:url("B612Mono-Regular.ttf") format("truetype");font-weight:400;font-display:swap}
            @font-face{font-family:"B612 Mono";src:url("B612Mono-Bold.ttf") format("truetype");font-weight:700;font-display:swap}
            :root{
              --bg:#fafafa; --surface:#ffffff; --surface-sunk:#ebebeb;
              --border:#e5e7eb; --border-strong:#d1d5db;
              --text:#1d1d1b; --text-dim:#4a4a4a; --text-mute:#6e6e6e;
              --ink:#21221f; --paper:#f6f7f8;
              --accent:#ff4f00; --accent-hover:#ff6a26; --accent-press:#d94300; --accent-ink:#b23a00; --on-accent:#1b0e00;
              --focus:#00b0ff; --ring:0 0 0 2px var(--bg),0 0 0 4px var(--focus);
              --radius:3px; --radius-lg:5px; --track-label:.18em;
              --font-mono:"B612 Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
              color-scheme:light;
            }
            *{box-sizing:border-box}
            .staticrypt-html{height:100%}
            .staticrypt-body{height:100%;margin:0}
            .staticrypt-content{min-height:100vh;margin:0;background:var(--bg);color:var(--text);
              font-family:var(--font-mono);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
            /* dot-grid backdrop — FIELD signature (ported from AP0110.org) */
            .staticrypt-content::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
              background-image:radial-gradient(circle,rgba(0,0,0,.09) 1px,transparent 1px);background-size:16px 16px}
            .staticrypt-page{position:relative;z-index:1;width:100%;max-width:400px;margin:0 auto;
              padding:14vh 20px 40px}
            /* the panel — translucent surface, hairline, crisp corners */
            .staticrypt-form{position:relative;background:color-mix(in srgb,var(--surface) 84%,transparent);
              -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);border:1px solid var(--border);
              border-radius:var(--radius-lg);padding:2.4rem 1.8rem;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:left}
            /* corner-bracket frame — FIELD composite motif */
            .fld-corner{position:absolute;width:12px;height:12px;pointer-events:none}
            .fld-corner.tl{top:8px;left:8px;border-top:2px solid var(--text-mute);border-left:2px solid var(--text-mute)}
            .fld-corner.tr{top:8px;right:8px;border-top:2px solid var(--text-mute);border-right:2px solid var(--text-mute)}
            .fld-corner.bl{bottom:8px;left:8px;border-bottom:2px solid var(--text-mute);border-left:2px solid var(--text-mute)}
            .fld-corner.br{bottom:8px;right:8px;border-bottom:2px solid var(--text-mute);border-right:2px solid var(--text-mute)}
            .staticrypt-instructions{margin:0 0 1.3rem}
            .fld-eyebrow{font-size:.75rem;letter-spacing:var(--track-label);text-transform:uppercase;
              color:var(--accent-ink);font-weight:700;margin:0 0 .85rem}
            .staticrypt-title{font-size:1.4rem;font-weight:700;line-height:1;margin:0}
            .fld-redacted{background:var(--ink);color:var(--paper);padding:.12rem .55rem;letter-spacing:.06em}
            .fld-sub{font-size:.8125rem;color:var(--text-dim);margin:.95rem 0 0;line-height:1.5}
            .staticrypt-hr{border:0;border-top:1px solid var(--border);margin:1.3rem 0}
            /* input — FIELD field (16px avoids iOS focus-zoom) */
            .staticrypt-password-container{position:relative;margin:0 0 1rem}
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{width:100%;font-family:var(--font-mono);font-size:16px;color:var(--text);
              background:var(--surface-sunk);border:1px solid var(--border-strong);border-radius:var(--radius);
              padding:.7rem 2.6rem .7rem .7rem;outline:0}
            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus{box-shadow:var(--ring);border-color:var(--focus)}
            .staticrypt-toggle-password-visibility{position:absolute;right:0;top:50%;transform:translateY(-50%);
              width:18px;height:18px;padding:12px;opacity:.55;cursor:pointer}
            /* button — FIELD primary (International Aerospace Orange) */
            .staticrypt-form .staticrypt-decrypt-button{width:100%;font-family:var(--font-mono);font-weight:700;
              font-size:.9375rem;letter-spacing:.08em;text-transform:uppercase;height:44px;
              background:var(--accent);color:var(--on-accent);border:2px solid var(--accent);border-radius:var(--radius);
              cursor:pointer;transition:.2s ease;outline:0}
            .staticrypt-form .staticrypt-decrypt-button:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
            .staticrypt-form .staticrypt-decrypt-button:active{background:var(--accent-press);border-color:var(--accent-press)}
            .staticrypt-form .staticrypt-decrypt-button:focus-visible{box-shadow:var(--ring)}
            /* remember */
            label.staticrypt-remember{display:flex;align-items:center;gap:.6rem;margin:0 0 1.1rem;
              font-size:.8125rem;color:var(--text-dim)}
            .staticrypt-remember input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);margin:0}
            .hidden{display:none!important}
            /* spinner */
            .staticrypt-spinner-container{height:100vh;display:flex;align-items:center;justify-content:center}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.22em solid var(--border-strong);
              border-right-color:var(--accent);border-radius:50%;animation:spinner-border .75s linear infinite}
            @keyframes spinner-border{100%{transform:rotate(360deg)}}
            @media (prefers-reduced-motion:reduce){.staticrypt-spinner{animation-duration:2.4s}*{transition:none!important}}
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container hidden">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content">
            <div class="staticrypt-page">
                <div class="staticrypt-form">
                    <span class="fld-corner tl"></span><span class="fld-corner tr"></span><span class="fld-corner bl"></span><span class="fld-corner br"></span>
                    <div class="staticrypt-instructions">
                        <p class="fld-eyebrow">◼ Restricted Access</p>
                        <p class="staticrypt-title"><span class="fld-redacted">ROADTRIP</span></p>

                            />
                        </div>

                        <label id="staticrypt-remember-label" class="staticrypt-remember">
                            <input id="staticrypt-remember" type="checkbox" name="remember" />
                            Remember me on this device
                        </label>

                        <input type="submit" class="staticrypt-decrypt-button" value="Decrypt" />
                    </form>
                </div>
            </div>
        </div>

        <script>/* preview: init stubbed */</script>
        <script>
            // PWA service worker. Offline decrypt needs one prior online visit
            // with "Remember me" checked (stores the hashed passphrase in localStorage).
            if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
        </script>
    </body>
</html>
